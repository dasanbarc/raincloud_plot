name: Deploy static site

on:
  push:
    branches:
      - master  # O la rama que uses como principal

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Copy built HTML to deployment folder
        run: |
          mkdir public
          cp -r PEC2/scripts/_build/html/* public/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
